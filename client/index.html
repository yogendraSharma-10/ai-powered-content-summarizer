<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Content Summarizer</title>
    <!-- Favicon - you might want to replace this with a custom one -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!--
        Link to the main CSS file.
        This ensures our React application has its styles applied.
        In a production build, this might be a hashed filename.
    -->
    <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
    <!--
        This is the root element where our React application will be mounted.
        The 'id="root"' is a common convention.
    -->
    <div id="root"></div>

    <!--
        The script tag below will load our React application.
        In a development environment, this might be a direct link to the bundled JS.
        In a production build, a build tool (like Webpack or Vite) would typically
        inject the correct, potentially hashed, script tag here.
        For simplicity and direct browser execution in a basic setup, we link directly.
    -->
    <script type="module" src="/src/index.js"></script>
</body>
</html>
